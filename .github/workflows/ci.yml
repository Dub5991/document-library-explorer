# CI: typecheck, lint, format, unit+a11y tests, e2e, build — every push/PR to main.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test
      - run: npm run test:a11y

      - name: e2e (Cypress)
        uses: cypress-io/github-action@v6
        with:
          build: npm run build
          start: npm run preview -- --port 5173
          wait-on: 'http://localhost:5173'
